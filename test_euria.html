<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Bootstrap</title>
    <!-- Lien vers Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Simulation de l'image de fond "Nature" */
        .bg-nature {
            /* Remplacez l'URL par votre image de feuilles */
            background-image: url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?q=80&w=2074&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            min-height: 100vh; /* Prend toute la hauteur de l'écran */
            display: flex;
            align-items: center; /* Centre verticalement la boîte */
            padding: 40px 0;
        }
        
        /* Personnalisation des couleurs pour matcher l'image */
        .text-orange-custom { color: #e65100; }
        .bg-orange-custom { background-color: #e65100; }
        .bg-input-custom { background-color: #dce7b5; border: none; border-bottom: 2px solid #afb42b; border-radius: 4px 4px 0 0; }
        .bg-input-custom:focus { background-color: #f0f4c3; outline: none; box-shadow: none; border-bottom: 2px solid #e65100; }
        
        /* Ajustement de la boîte blanche */
        .contact-box {
            max-width: 900px; /* Largeur max similaire à l'image */
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <section class="bg-nature">
        <div class="container">
            <!-- Début de la Boîte Blanche -->
            <div class="contact-box bg-white p-4 p-md-5 shadow-lg rounded">
                <div class="row g-5"> <!-- g-5 ajoute de l'espace entre les colonnes -->
                    
                    <!-- Colonne Gauche : Texte et Infos -->
                    <div class="col-lg-5">
                        <h1 class="display-4 fw-bold text-orange-custom text-uppercase mb-4">
                            DITES<br>BONJOUR
                        </h1>
                        <p class="text-muted mb-4">
                            Vous portez un projet<br>
                            Vous avez besoin d'un renseignement<br>
                            Ou vous avez simplement envie de nous faire coucou
                        </p>
                        <p class="mb-5">
                            écrivez-nous !<br>
                            ça nous fait toujours plaisir !
                        </p>

                        <div class="row">
                            <div class="col-6">
                                <h5 class="text-orange-custom fw-bold">TÉLÉPHONE</h5>
                                <p class="mb-0">06 29 12 86 17</p>
                            </div>
                            <div class="col-6">
                                <h5 class="text-orange-custom fw-bold">E-MAIL</h5>
                                <p class="mb-0"><a href="mailto:araucaria.asso@gmail.com" class="text-decoration-none text-dark">araucaria.asso@gmail.com</a></p>
                            </div>
                        </div>
                    </div>

                    <!-- Colonne Droite : Formulaire -->
                    <div class="col-lg-7">
                        <form>
                            <!-- Ligne Prénom / Nom -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="prenom" class="form-label small text-muted">Prénom</label>
                                    <input type="text" class="form-control bg-input-custom" id="prenom">
                                </div>
                                <div class="col-md-6">
                                    <label for="nom" class="form-label small text-muted">Nom</label>
                                    <input type="text" class="form-control bg-input-custom" id="nom">
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label small text-muted">E-mail <span class="text-danger">*</span></label>
                                <input type="email" class="form-control bg-input-custom" id="email" required>
                            </div>

                            <!-- Message -->
                            <div class="mb-4">
                                <label for="message" class="form-label small text-muted">Message</label>
                                <textarea class="form-control bg-input-custom" id="message" rows="4"></textarea>
                            </div>

                            <!-- Bouton -->
                            <div class="d-grid">
                                <button type="submit" class="btn bg-orange-custom text-white btn-lg rounded-pill">Envoyer</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
            <!-- Fin de la Boîte Blanche -->
        </div>
    </section>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
